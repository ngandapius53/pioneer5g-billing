<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E-Knox Net Captive Wi-Fi</title>
  <style>
    :root {
      --bg: #050505;
      --chrome: #181818;
      --panel: #151515;
      --card: #1c1c1c;
      --input: #303030;
      --line: #303030;
      --text: #f2f2f2;
      --muted: #adadad;
      --green: #28c565;
      --green-dark: #11a854;
      font-family: Arial, Helvetica, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
      color: var(--text);
      padding: 18px;
    }
    button, input { font: inherit; }
    button { border: 0; cursor: pointer; }

    .phone {
      width: min(100%, 414px);
      height: min(900px, calc(100vh - 28px));
      border-radius: 30px;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid #222;
      box-shadow: 0 28px 80px rgba(0,0,0,.7);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .chrome {
      background: var(--chrome);
      border-bottom: 1px solid #202020;
    }
    .status {
      min-height: 52px;
      display: grid;
      place-items: center;
      text-align: center;
      color: #a8a8a8;
      font-size: 13px;
      line-height: 1.35;
      padding-top: 8px;
    }
    .status strong {
      display: block;
      color: #dfdfdf;
      font-size: 14px;
      font-weight: 700;
    }
    .nav {
      height: 70px;
      display: grid;
      grid-template-columns: 100px 1fr 58px;
      align-items: center;
      padding: 0 12px;
      border-top: 1px solid rgba(255,255,255,.02);
    }
    .arrows {
      width: 86px;
      height: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      justify-items: center;
      border-radius: 999px;
      background: #1b1b1b;
      color: #777;
      font-size: 34px;
      line-height: 1;
    }
    .title {
      text-align: center;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
    }
    .close {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      margin-left: auto;
      border-radius: 50%;
      border: 1px solid #2b2b2b;
      color: #f2f2f2;
      font-size: 34px;
      line-height: 1;
    }

    .screen {
      overflow: auto;
      padding: 32px 8px 28px;
      background: #151515;
    }
    .box {
      min-height: 100%;
      border: 1px solid #343434;
      border-radius: 6px;
      padding: 30px 16px 28px;
      background: #151515;
    }

    .brand {
      text-align: center;
      margin-bottom: 24px;
    }
    .wifi {
      width: 58px;
      height: 48px;
      margin: 0 auto 10px;
      position: relative;
    }
    .wifi span {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--green);
      border-radius: 50%;
    }
    .wifi span:nth-child(1) { width: 56px; height: 56px; top: 0; }
    .wifi span:nth-child(2) { width: 40px; height: 40px; top: 12px; }
    .wifi span:nth-child(3) { width: 24px; height: 24px; top: 24px; }
    .dot {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transform: translateX(-50%);
      background: var(--green);
    }
    .brand h1 {
      margin: 0;
      color: var(--green);
      font-size: 22px;
      font-weight: 900;
    }

    .voucher {
      display: grid;
      grid-template-columns: 1fr 96px;
      gap: 8px;
      max-width: 362px;
      margin: 0 auto 20px;
    }
    input {
      height: 48px;
      border: 1px solid #282828;
      border-radius: 7px;
      padding: 0 16px;
      color: #fff;
      background: var(--input);
      outline: 0;
    }
    input::placeholder { color: #b8b8b8; }
    .login,
    .buy,
    .pay {
      height: 48px;
      border-radius: 8px;
      background: linear-gradient(180deg, #4fcd6d, var(--green));
      color: #152217;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(40,197,101,.2);
    }

    .find {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: fit-content;
      margin: 0 auto 27px;
      padding: 0 13px;
      border-radius: 7px;
      border: 1px solid rgba(40,197,101,.42);
      background: rgba(40,197,101,.05);
      color: var(--green);
      font-size: 14px;
      font-weight: 700;
    }

    .hint {
      margin: 0 0 26px;
      text-align: center;
      color: #b7b7b7;
      font-size: 16px;
    }

    .plans {
      max-width: 362px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }
    .plan {
      min-height: 78px;
      display: grid;
      grid-template-columns: 1fr auto 96px;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1d1d1d;
    }
    .name {
      color: #efefef;
      font-size: 18px;
      line-height: 1.02;
      font-weight: 900;
    }
    .name small {
      display: block;
      margin-top: 5px;
      color: #a7a7a7;
      font-size: 13px;
      font-weight: 700;
    }
    .price {
      color: var(--green);
      font-size: 18px;
      font-weight: 900;
      white-space: nowrap;
    }
    .buy {
      height: 44px;
      font-size: 18px;
      color: #1b271d;
    }

    .footer {
      max-width: 340px;
      margin: 18px auto 0;
      text-align: center;
      color: #777;
      font-size: 12px;
      line-height: 1.4;
    }

    .modal-wrap {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(0,0,0,.72);
      z-index: 10;
    }
    .modal-wrap.show { display: grid; }
    .modal {
      width: min(100%, 350px);
      padding: 18px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #181818;
      box-shadow: 0 22px 60px rgba(0,0,0,.6);
    }
    .modal h2 { margin: 0 0 8px; }
    .modal p {
      margin: 0 0 12px;
      color: var(--muted);
    }
    .modal input { width: 100%; margin-bottom: 10px; }
    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .cancel {
      height: 48px;
      border-radius: 8px;
      background: #292929;
      color: #fff;
      border: 1px solid #3a3a3a;
      font-weight: 900;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      width: min(380px, calc(100vw - 28px));
      transform: translate(-50%, 16px);
      opacity: 0;
      padding: 12px 14px;
      border-radius: 8px;
      background: #101010;
      color: #fff;
      border: 1px solid #333;
      pointer-events: none;
      transition: .2s ease;
      z-index: 20;
    }
    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 460px) {
      body { padding: 0; align-items: start; }
      .phone {
        width: 100%;
        height: 100vh;
        border-radius: 0;
        border: 0;
      }
      .screen { padding: 32px 6px 24px; }
      .box { padding-left: 10px; padding-right: 10px; }
      .plan {
        grid-template-columns: 1fr 108px;
      }
      .price { grid-column: 1; }
      .buy {
        grid-row: 1 / span 2;
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <main class="phone">
    <header class="chrome">
      <div class="status">
        <span>Not Secure - wifi.login</span>
        <strong>E-KNOX NET_5G</strong>
      </div>
      <div class="nav">
        <div class="arrows"><span>&lsaquo;</span><span>&rsaquo;</span></div>
        <div class="title">Captive Wi-Fi</div>
        <div class="close">&times;</div>
      </div>
    </header>

    <section class="screen">
      <div class="box">
        <div class="brand">
          <div class="wifi" aria-hidden="true">
            <span></span><span></span><span></span><i class="dot"></i>
          </div>
          <h1>E-Knox Net</h1>
        </div>

        <form class="voucher" id="voucherForm">
          <input id="voucherCode" placeholder="Enter your voucher code" autocomplete="one-time-code">
          <button class="login" type="submit">Login</button>
        </form>

        <button class="find" id="findVoucher" type="button">&#9906; Already bought? Find My Voucher</button>
        <p class="hint">Select a package and pay with Mobile Money</p>

        <div class="plans" id="plans"></div>
        <p class="footer">For support call or WhatsApp 0702997307</p>
      </div>
    </section>
  </main>

  <div class="modal-wrap" id="modal">
    <div class="modal">
      <h2 id="modalTitle">Buy Voucher</h2>
      <p id="modalInfo"></p>
      <input id="phone" inputmode="tel" placeholder="Mobile Money number">
      <div class="modal-actions">
        <button class="cancel" id="cancel" type="button">Cancel</button>
        <button class="pay" id="pay" type="button">Pay</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const packages = [
      { title: 'DAILY', mark: '&#128293;', time: '24 Hours', price: 1000 },
      { title: 'Weekend Special', mark: '&#9996;', time: '2 Days', price: 2000 },
      { title: 'WEEKLY #20% OFF#', mark: '&#128521;', time: '7 Days', price: 5000 },
      { title: 'Monthly #25% OFF#', mark: '&#11088;', time: '30 Days', price: 20000 }
    ];

    const qs = (selector) => document.querySelector(selector);
    const money = (value) => `UGX ${value.toLocaleString('en-UG')}`;
    let selected = packages[0];

    function showToast(message) {
      qs('#toast').textContent = message;
      qs('#toast').classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => qs('#toast').classList.remove('show'), 2400);
    }

    function renderPlans() {
      qs('#plans').innerHTML = packages.map((plan, index) => `
        <article class="plan">
          <div class="name">${plan.title} ${plan.mark}<small>${plan.time}</small></div>
          <div class="price">${money(plan.price)}</div>
          <button class="buy" type="button" data-index="${index}">BUY</button>
        </article>
      `).join('');
    }

    document.addEventListener('click', (event) => {
      if (event.target.matches('.buy')) {
        selected = packages[Number(event.target.dataset.index)];
        qs('#modalTitle').textContent = selected.title;
        qs('#modalInfo').textContent = `${selected.time} - ${money(selected.price)}`;
        qs('#modal').classList.add('show');
        qs('#phone').focus();
      }
      if (event.target.id === 'modal') qs('#modal').classList.remove('show');
    });

    qs('#cancel').addEventListener('click', () => qs('#modal').classList.remove('show'));
    qs('#pay').addEventListener('click', () => {
      const phone = qs('#phone').value.trim();
      if (!/^0\d{8,9}$/.test(phone)) return showToast('Enter a valid Mobile Money number');
      const code = 'EKN-' + Math.random().toString(36).slice(2, 8).toUpperCase();
      qs('#modal').classList.remove('show');
      showToast(`Payment prompt sent. Voucher: ${code}`);
    });
    qs('#voucherForm').addEventListener('submit', (event) => {
      event.preventDefault();
      const code = qs('#voucherCode').value.trim();
      if (!code) return showToast('Enter your voucher code');
      showToast(`Voucher ${code.toUpperCase()} accepted. Connecting...`);
    });
    qs('#findVoucher').addEventListener('click', () => showToast('Enter your phone number after tapping BUY.'));

    renderPlans();
  </script>
</body>
</html>
